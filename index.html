<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="./style.css">
  
  <title>Social Links Profile</title>
</head>
<body>
  <main class="page-shell">
    <article class="profile-card" aria-labelledby="profile-name">
      <img class="profile-card__avatar" src="./assets/images/avatar-solji.png" alt="Solji Charón smiling at the camera">

      <h1 id="profile-name" class="profile-card__name">Solji Charón Peña</h1>
      <p class="profile-card__location">La Habana, Cuba</p>
      <p class="profile-card__bio">Computer Scientist and Software Developer</p>

      <nav aria-label="Social links">
        <ul class="social-links">
          <li><a href="https://github.com/sooolji/" class="social-links__link">GitHub</a></li>
          <li><a href="https://x.com/anoncilllo" class="social-links__link">Twitter</a></li>
          <li><a href="https://instagram.com/anoncilllo" class="social-links__link">Instagram</a></li>
          <li><a href="mailto:soljicharon@gmail.com" class="social-links__link">Gmail</a></li>
          <li><a href="https://t.me/anoncilllo" class="social-links__link">Telegram</a></li>
        </ul>
      </nav>
    </article>

    <div class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank" rel="noreferrer">Frontend Mentor</a>.
      Coded by <a href="#">Solji</a>.
    </div>
  </main>
</body>
</html>
